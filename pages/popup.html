<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stirling PDF</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-2: #11141c;
      --border: #2a2d3a;
      --accent: #f97316;
      --accent-2: #fb923c;
      --text: #e8eaf0;
      --muted: #8992a3;
      --muted-2: #aeb7c7;
      --success: #22c55e;
      --font: "DM Mono", "Fira Code", monospace;
    }

    body {
      background:
        radial-gradient(circle at top right, rgba(249, 115, 22, 0.12), transparent 32%),
        var(--bg);
      color: var(--text);
      font-family: var(--font);
      width: 312px;
      padding: 14px;
    }

    .panel {
      background: rgba(26, 29, 39, 0.96);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      flex-shrink: 0;
    }

    .logo-icon svg {
      width: 18px;
      height: 18px;
    }

    .title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.2px;
    }

    .version {
      font-size: 10px;
      color: var(--muted);
      margin-top: 1px;
    }

    .status-card {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 11px 12px;
      background: linear-gradient(180deg, rgba(17, 20, 28, 0.95), rgba(22, 26, 36, 0.95));
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--success);
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.12);
      flex-shrink: 0;
      margin-top: 5px;
    }

    .status-card.inactive .status-dot {
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.12);
    }

    .status-copy {
      min-width: 0;
    }

    .status-title {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .status-text {
      font-size: 12px;
      line-height: 1.5;
      color: var(--text);
      margin-bottom: 5px;
    }

    .configured-link {
      display: inline-block;
      font-size: 11px;
      color: var(--accent);
      text-decoration: none;
      word-break: break-all;
      line-height: 1.45;
    }

    .configured-link:not([href]) {
      color: var(--muted-2);
      cursor: default;
    }

    .section-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 7px;
      padding-left: 2px;
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr 40px;
      gap: 8px;
      margin-bottom: 8px;
    }

    input[type="text"] {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font);
      font-size: 11px;
      padding: 11px 12px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.12);
    }

    input[type="text"]::placeholder {
      color: var(--muted-2);
    }

    .go-btn,
    .btn {
      border: none;
      border-radius: 10px;
      font-family: var(--font);
      cursor: pointer;
      transition: transform 0.12s, border-color 0.15s, background 0.15s, opacity 0.15s;
    }

    .go-btn:hover:not(:disabled),
    .btn:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    .go-btn:disabled,
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .go-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .go-btn svg {
      width: 16px;
      height: 16px;
    }

    .btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      text-align: left;
      font-size: 12px;
    }

    .btn:hover:not(:disabled) {
      border-color: var(--accent);
      background: rgba(249, 115, 22, 0.05);
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-color: transparent;
      color: #fff;
      font-weight: 700;
      justify-content: center;
      align-items: center;
      margin-bottom: 10px;
    }

    .btn.primary .btn-icon {
      width: 15px;
      height: 15px;
      position: relative;
      top: -0.5px;
    }

    .btn-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .btn-grid .btn {
      justify-content: center;
      padding: 10px 8px;
      text-align: center;
      gap: 8px;
    }

    .btn-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      color: currentColor;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 12px 0;
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="header">
      <div class="logo-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <path d="M14 2v6h6"></path>
          <path d="M8 13h8"></path>
          <path d="M8 17h5"></path>
        </svg>
      </div>
      <div>
        <div class="title">Stirling PDF</div>
        <div class="version">v1.5.0 · Redirector</div>
      </div>
    </div>

    <div class="status-card" id="statusCard">
      <div class="status-dot" aria-hidden="true"></div>
      <div class="status-copy">
        <div class="status-title">Configured Target</div>
        <div class="status-text" id="statusText">Loading configuration...</div>
        <a class="configured-link" id="configuredUrl" target="_blank" rel="noreferrer">Loading...</a>
      </div>
    </div>

    <div class="section-label">Open Remote PDF</div>

    <div class="input-row">
      <input type="text" id="urlInput" placeholder="Paste a PDF URL..." />
      <button class="go-btn" id="goBtn" aria-label="Open PDF URL">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M5 12h14"></path>
          <path d="m13 5 7 7-7 7"></path>
        </svg>
      </button>
    </div>

    <button class="btn primary" id="uploadLocalBtn">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <path d="M7 10l5-5 5 5"></path>
        <path d="M12 5v12"></path>
      </svg>
      Open Local PDF
    </button>

    <div class="divider"></div>

    <div class="section-label">Quick Actions</div>

    <div class="btn-grid">
      <button class="btn" id="openStirlingBtn">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="9"></circle>
          <path d="M3 12h18"></path>
          <path d="M12 3a15.3 15.3 0 0 1 0 18"></path>
          <path d="M12 3a15.3 15.3 0 0 0 0 18"></path>
        </svg>
        Dashboard
      </button>

      <button class="btn" id="openSettingsBtn">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.54V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1-1.54 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.54-1H3a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.54-1 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-1.54V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 1.54 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9c.24.6.83 1 1.48 1H21a2 2 0 1 1 0 4h-.12c-.65 0-1.24.4-1.48 1z"></path>
        </svg>
        Settings
      </button>
    </div>
  </div>

  <script src="../config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
