<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stirling PDF</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --accent: #f97316;
      --text: #e8eaf0;
      --muted: #6b7280;
      --font: 'DM Mono', 'Fira Code', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      width: 300px;
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #f97316, #fb923c);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .title { font-size: 15px; font-weight: 700; }
    .version { font-size: 10px; color: var(--muted); margin-top: 1px; }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 14px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .section-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.15s, background 0.15s;
      margin-bottom: 6px;
    }

    .btn:hover {
      border-color: var(--accent);
      background: rgba(249,115,22,0.05);
    }

    .btn.primary {
      background: linear-gradient(135deg, #f97316, #fb923c);
      border-color: transparent;
      color: #fff;
      font-weight: 700;
    }

    .btn.primary:hover { opacity: 0.9; }

    .btn-icon { font-size: 14px; flex-shrink: 0; }

    .input-row {
      display: flex;
      gap: 6px;
      margin-bottom: 6px;
    }

    input[type="text"] {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font);
      font-size: 11px;
      padding: 9px 10px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--muted); }

    .go-btn {
      padding: 9px 14px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: var(--font);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }

    .go-btn:hover { opacity: 0.85; }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 14px 0;
    }

    .footer {
      font-size: 10px;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }

    .footer a {
      color: var(--accent);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-icon">📄</div>
    <div>
      <div class="title">Stirling PDF</div>
      <div class="version">v1.0.0 · Redirector</div>
    </div>
  </div>

  <div class="status-row">
    <div class="dot"></div>
    <span>Auto-redirect active → <strong>pdf.arcont.si</strong></span>
  </div>

  <div class="section-label">Open PDF</div>

  <div class="input-row">
    <input type="text" id="urlInput" placeholder="Paste a PDF URL…" />
    <button class="go-btn" id="goBtn">→</button>
  </div>

  <button class="btn primary" id="uploadLocalBtn">
    <span class="btn-icon">⬆</span>
    Upload Local PDF File
  </button>

  <div class="divider"></div>

  <div class="section-label">Quick Links</div>

  <button class="btn" id="openStirlingBtn">
    <span class="btn-icon">🏠</span>
    Open Stirling PDF Dashboard
  </button>

  <div class="divider"></div>

  <div class="footer">
    All PDFs are redirected to your self-hosted instance.<br>
    <a href="https://pdf.arcont.si" target="_blank">pdf.arcont.si</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
